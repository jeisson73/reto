spring.application.name=order-service
server.port=8083

catalog.service.url=${CATALOG_SERVICE_URL:http://catalog-service:8082}
order.request.timeout-ms=${ORDER_REQUEST_TIMEOUT_MS:3000}
order.events.queue=${ORDER_EVENTS_QUEUE:orders.events}

spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin}

management.endpoints.web.exposure.include=health
